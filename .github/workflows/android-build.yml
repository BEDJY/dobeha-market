name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize React Native Project Wrapper (Android 14 / API 34+)
        run: |
          # Inicializar proyecto con React Native 0.73.6
          npx react-native@0.73.6 init BuildApp --directory build-app --skip-install --version 0.73.6
          cp -r build-app/android .
          [ ! -f metro.config.js ] && cp build-app/metro.config.js .
          [ ! -f app.json ] && cp build-app/app.json .
          
          # Ejecutar script de combinación de dependencias y configuración Gradle (que ya viene en el repo)
          node merge-deps.js
          rm merge-deps.js
          rm -rf build-app
          rm -f App.tsx
          
          # 4. Asegurar que exista index.js con GluestackUIProvider en la raíz para bundling
          if [ ! -f index.js ]; then
            echo "import React from 'react';" > index.js
            echo "import { AppRegistry } from 'react-native';" >> index.js
            echo "import { GluestackUIProvider } from '@gluestack-ui/themed';" >> index.js
            echo "import { config } from '@gluestack-ui/config';" >> index.js
            echo "import App from './App';" >> index.js
            echo "import { name as appName } from './app.json';" >> index.js
            echo "const RootApp = () => (" >> index.js
            echo "  <GluestackUIProvider config={config}>" >> index.js
            echo "    <App />" >> index.js
            echo "  </GluestackUIProvider>" >> index.js
            echo ");" >> index.js
            echo "AppRegistry.registerComponent(appName, () => RootApp);" >> index.js
            echo "Creado archivo index.js con GluestackUIProvider"
          fi

          # 4.5. Configurar babel.config.js para soportar bloques estáticos de clase en node_modules (evita here-docs)
          if [ ! -f babel.config.js ]; then
            echo "module.exports = { presets: ['module:@react-native/babel-preset'], plugins: [['@babel/plugin-transform-class-static-block']] };" > babel.config.js
          else
            node -e "const fs = require('fs'); if (fs.existsSync('babel.config.js')) { let c = fs.readFileSync('babel.config.js', 'utf8'); if (!c.includes('static-block')) { c = c.includes('plugins:') ? c.replace('plugins: [', 'plugins: [['@babel/plugin-transform-class-static-block'],') : c.replace('presets:', 'plugins: [['@babel/plugin-transform-class-static-block']], presets:'); fs.writeFileSync('babel.config.js', c); } }"
          fi

          # 5. Optimización de límites de memoria JVM en gradle para evitar Out-Of-Memory en el runner
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties

      - name: Install Project Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Release APK (with Proguard/R8 Shrinking)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build-${{ github.run_number }}
          name: Build Release v1.0.0-build-${{ github.run_number }}
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
