name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize React Native Project Wrapper (Android 14 / API 34+)
        run: |
          # Inicializar proyecto con React Native 0.74.1 (targets Android 14 nativamente)
          npx react-native@0.74.1 init BuildApp --directory build-app --skip-install --version 0.74.1
          cp -r build-app/android .
          cp build-app/metro.config.js .
          cp build-app/app.json .
          
          # Forzar configuración Gradle para usar compileSdkVersion y targetSdkVersion 34 (Android 14)
          node -e "
            const fs = require('fs');
            
            // 1. Modificar gradle de nivel raíz para asegurar target 34
            if (fs.existsSync('android/build.gradle')) {
              let rootGradle = fs.readFileSync('android/build.gradle', 'utf8');
              rootGradle = rootGradle.replace(/compileSdkVersions*=s*d+/g, 'compileSdkVersion = 34');
              rootGradle = rootGradle.replace(/targetSdkVersions*=s*d+/g, 'targetSdkVersion = 34');
              fs.writeFileSync('android/build.gradle', rootGradle);
            }
            
            // 2. Modificar gradle de app
            if (fs.existsSync('android/app/build.gradle')) {
              let appGradle = fs.readFileSync('android/app/build.gradle', 'utf8');
              appGradle = appGradle.replace(/compileSdkVersions+d+/g, 'compileSdkVersion 34');
              appGradle = appGradle.replace(/targetSdkVersions+d+/g, 'targetSdkVersion 34');
              
              // Habilitar Code Shrinking (Proguard/R8) y Resource Shrinking para APK ligera
              appGradle = appGradle.replace(/minifyEnableds+false/g, 'minifyEnabled true');
              if (!appGradle.includes('shrinkResources')) {
                appGradle = appGradle.replace(/minifyEnableds+true/g, 'minifyEnabled true
            shrinkResources true');
              }
              appGradle = appGradle.replace(/enableProguardInReleaseBuildss*=s*false/g, 'enableProguardInReleaseBuilds = true');
              
              fs.writeFileSync('android/app/build.gradle', appGradle);
            }
            
            // 3. Fusionar dependencias de package.json
            const pkg = JSON.parse(fs.readFileSync('build-app/package.json', 'utf8'));
            pkg.dependencies['react-native-svg'] = '^15.2.0';
            pkg.dependencies['lucide-react-native'] = '^0.370.0';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          rm -rf build-app
          rm -f App.tsx

      - name: Install Project Dependencies
        run: |
          npm install

      - name: Build Release APK (with Proguard/R8 Shrinking)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build-${{ github.run_number }}
          name: Build Release v1.0.0-build-${{ github.run_number }}
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
