name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize React Native Project Wrapper
        run: |
          npx react-native@0.72.6 init BuildApp --directory build-app --skip-install --version 0.72.6
          cp -r build-app/android .
          cp build-app/metro.config.js .
          cp build-app/app.json .
          # Merge package.json dependencies
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('build-app/package.json', 'utf8'));
            pkg.dependencies['react-native-svg'] = '^13.9.0';
            pkg.dependencies['lucide-react-native'] = '^0.294.0';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          rm -rf build-app
          rm -f App.tsx

      - name: Install Project Dependencies
        run: |
          npm install

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon || ./gradlew assembleDebug --no-daemon

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build-${{ github.run_number }}
          name: Build Release v1.0.0-build-${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
